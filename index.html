  var div = L.DomUtil.create('div','legend');
  div.innerHTML = '<h4>ISP Partners<\/h4>';
  allISPs.forEach(function(isp) { var count = markets.filter(function(m){return m.isp===isp}).length; div.innerHTML += '<span class="dot" style="background:'+(ispColors[isp]||'#333')+'"><\/span>'+isp+' ('+count+')<br>'; });
  div.innerHTML += '<br><b>Total: '+markets.length+' markets<\/b>';
  return div;
};
legend.addTo(map);
</script>
