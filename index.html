  /* Header */
  .header { background: linear-gradient(135deg, #2F5496, #1a3a6e); color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.3px; }
  .header-subtitle { font-size: 12px; opacity: 0.85; margin-top: 2px; }

  /* Stats bar */
  .stats-bar { background: #fff; border-bottom: 1px solid #ddd; padding: 10px 24px; display: flex; gap: 32px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat-value { font-size: 20px; font-weight: 700; color: #2F5496; }
  .stat-label { font-size: 11px; color: #777; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Controls bar */
  .controls-bar { background: #fff; border-bottom: 1px solid #ddd; padding: 8px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
  .controls-bar select, .controls-bar input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; font-family: inherit; background: #fff; }
  .controls-bar select { min-width: 160px; }
  .controls-bar input { min-width: 180px; }
  .controls-bar select:focus, .controls-bar input:focus { outline: none; border-color: #2F5496; box-shadow: 0 0 0 2px rgba(47,84,150,0.15); }
  .btn-toggle { padding: 6px 14px; border: 1px solid #2F5496; border-radius: 4px; background: #2F5496; color: #fff; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-toggle:hover { background: #1a3a6e; }

  /* Map + sidebar container */
  .map-container { flex: 1; display: flex; position: relative; overflow: hidden; }
  #map { flex: 1; z-index: 1; }

  /* Sidebar */
  .sidebar { width: 340px; background: #fff; border-left: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; transition: margin-right 0.25s ease; z-index: 2; }
  .sidebar.hidden { margin-right: -340px; }
  .sidebar-header { padding: 12px 16px; font-size: 14px; font-weight: 600; color: #2F5496; border-bottom: 1px solid #eee; flex-shrink: 0; }
  .sidebar-list { flex: 1; overflow-y: auto; }
  .sidebar-item { padding: 10px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 13px; transition: background 0.15s; }
  .sidebar-item:hover { background: #f0f4fa; }
  .sidebar-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .sidebar-info { flex: 1; }
  .sidebar-city { font-weight: 600; color: #333; }
  .sidebar-meta { font-size: 11px; color: #888; margin-top: 2px; }
  .sidebar-leads { font-weight: 700; color: #2F5496; white-space: nowrap; font-size: 12px; }

  /* Legend */
  .legend { background: #fff; border-radius: 6px; box-shadow: 0 1px 5px rgba(0,0,0,0.2); padding: 10px 14px; font-size: 12px; line-height: 1.6; max-height: 340px; overflow-y: auto; }
  .legend-title { font-weight: 700; margin-bottom: 6px; color: #333; }
  .legend-item { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 2px 0; user-select: none; }
  .legend-item.disabled { opacity: 0.35; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.15); flex-shrink: 0; }
  .legend-label { flex: 1; }
  .legend-count { color: #999; font-size: 11px; }

  /* Leaflet popup styling */
  .market-popup .leaflet-popup-content-wrapper { border-radius: 8px; }
  .market-popup .leaflet-popup-content { margin: 12px 16px; font-family: inherit; }
  .popup-city { font-size: 15px; font-weight: 700; color: #2F5496; margin-bottom: 4px; }
  .popup-row { font-size: 13px; color: #555; margin: 3px 0; }
  .popup-row strong { color: #333; }
</style>
</head>

// ISP Colors
var ISP_COLORS = {
  "All West": "#e6194b",
  "Alta Fiber": "#3cb44b",
  "Buckeye": "#ffe119",
  "C-Spire": "#4363d8",
  "Frontier": "#f58231",
  "Gateway": "#911eb4",
  "Kinetic": "#42d4f4",
  "MaxxSouth": "#f032e6",
  "NH Broadband": "#469990",
  "Pavlov": "#9A6324",
  "Point": "#800000",
  "Sparklight": "#00a86b",
  "Ezee": "#000075"
};

var LAST_UPDATED = "2026-06-30";

// Parse leads string to number (strips commas, plus signs, non-digits)
function parseLeads(s) {
  if (!s || s === "N/A") return 0;
  return parseInt(s.replace(/[^0-9]/g, ''), 10) || 0;
}

// Deduplicate: keep last occurrence keyed on name+state+isp
var deduped = {};
RAW_MARKETS.forEach(function(m) {
  var key = (m.name + '|' + m.state + '|' + m.isp).toLowerCase();
  deduped[key] = m;
});
var MARKETS = Object.keys(deduped).map(function(k) { return deduped[k]; });

// Compute global stats
var ispSet = {};
var stateSet = {};
MARKETS.forEach(function(m) { ispSet[m.isp] = true; stateSet[m.state] = true; });
var allISPs = Object.keys(ispSet).sort();
var allStates = Object.keys(stateSet).sort();
var totalLeads = MARKETS.reduce(function(sum, m) { return sum + parseLeads(m.leads); }, 0);

// ISP visibility toggle state
var ispVisible = {};
allISPs.forEach(function(isp) { ispVisible[isp] = true; });

// === INIT MAP ===
var map = L.map('map', { zoomControl: true }).setView([38.5, -90.0], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 18
}).addTo(map);

var markerLayer = L.layerGroup().addTo(map);
var allMarkerObjects = [];

function createMarkers() {
  markerLayer.clearLayers();
  allMarkerObjects = [];

  var ispFilter = document.getElementById('filterISP').value;
  var stateFilter = document.getElementById('filterState').value;
  var citySearch = document.getElementById('searchCity').value.toLowerCase().trim();

  var filtered = MARKETS.filter(function(m) {
    if (ispFilter && m.isp !== ispFilter) return false;
    if (stateFilter && m.state !== stateFilter) return false;
    if (citySearch && m.name.toLowerCase().indexOf(citySearch) === -1) return false;
    if (!ispVisible[m.isp]) return false;
    return true;
  });

  filtered.forEach(function(m) {
    var color = ISP_COLORS[m.isp] || '#888';
    var marker = L.circleMarker([m.lat, m.lng], {
      radius: 7,
      fillColor: color,
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.85
    });

    marker.bindTooltip(m.name, { direction: 'top', offset: [0, -8] });
    marker.bindPopup(
      '<div class="popup-city">' + m.name + '</div>' +
      '<div class="popup-row"><strong>State:</strong> ' + m.state + '</div>' +
      '<div class="popup-row"><strong>ISP:</strong> ' + m.isp + '</div>' +
      '<div class="popup-row"><strong>Leads:</strong> ' + m.leads + '</div>',
      { className: 'market-popup', maxWidth: 220 }
    );

    marker.marketData = m;
    marker.addTo(markerLayer);
    allMarkerObjects.push(marker);
  });

  updateSidebar(filtered);
  document.getElementById('sidebarCount').textContent = filtered.length;
}

// === STATS BAR ===
function renderStats() {
  var bar = document.getElementById('statsBar');
  bar.innerHTML =
    '<div class="stat"><div class="stat-value">' + MARKETS.length + '</div><div class="stat-label">Total Markets</div></div>' +
    '<div class="stat"><div class="stat-value">' + allISPs.length + '</div><div class="stat-label">ISP Partners</div></div>' +
    '<div class="stat"><div class="stat-value">' + allStates.length + '</div><div class="stat-label">States</div></div>' +
    '<div class="stat"><div class="stat-value">' + totalLeads.toLocaleString() + '</div><div class="stat-label">Total Leads</div></div>' +
    '<div class="stat"><div class="stat-value">' + LAST_UPDATED + '</div><div class="stat-label">Last Updated</div></div>';
}

// === CONTROLS ===
function populateFilters() {
  var ispSelect = document.getElementById('filterISP');
  allISPs.forEach(function(isp) {
    var opt = document.createElement('option');
    opt.value = isp;
    opt.textContent = isp;
    ispSelect.appendChild(opt);
  });

  var stateSelect = document.getElementById('filterState');
  allStates.forEach(function(st) {
    var opt = document.createElement('option');
    opt.value = st;
    opt.textContent = st;
    stateSelect.appendChild(opt);
  });
}

document.getElementById('filterISP').addEventListener('change', createMarkers);
document.getElementById('filterState').addEventListener('change', createMarkers);
document.getElementById('searchCity').addEventListener('input', createMarkers);

document.getElementById('btnToggleSidebar').addEventListener('click', function() {
  document.getElementById('sidebar').classList.toggle('hidden');
  setTimeout(function() { map.invalidateSize(); }, 300);
});

// === SIDEBAR ===
function updateSidebar(filtered) {
  var list = document.getElementById('sidebarList');
  var sorted = filtered.slice().sort(function(a, b) { return parseLeads(b.leads) - parseLeads(a.leads); });
  list.innerHTML = '';

  sorted.forEach(function(m) {
    var color = ISP_COLORS[m.isp] || '#888';
    var item = document.createElement('div');
    item.className = 'sidebar-item';
    item.innerHTML =
      '<div class="sidebar-dot" style="background:' + color + '"></div>' +
      '<div class="sidebar-info"><div class="sidebar-city">' + m.name + '</div>' +
      '<div class="sidebar-meta">' + m.state + ' &middot; ' + m.isp + '</div></div>' +
      '<div class="sidebar-leads">' + m.leads + '</div>';
    item.addEventListener('click', (function(market) {
      return function() {
        map.setView([market.lat, market.lng], 12);
        allMarkerObjects.forEach(function(mk) {
          if (mk.marketData === market) mk.openPopup();
        });
      };
    })(m));
    list.appendChild(item);
  });
}

// === LEGEND ===
function createLegend() {
  var legend = L.control({ position: 'bottomright' });
  legend.onAdd = function() {
    var div = L.DomUtil.create('div', 'legend');
    div.innerHTML = '<div class="legend-title">ISP Partners</div>';

    var counts = {};
    MARKETS.forEach(function(m) { counts[m.isp] = (counts[m.isp] || 0) + 1; });

    allISPs.forEach(function(isp) {
      var color = ISP_COLORS[isp] || '#888';
      var count = counts[isp] || 0;
      var item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML =
        '<div class="legend-dot" style="background:' + color + '"></div>' +
        '<span class="legend-label">' + isp + '</span>' +
        '<span class="legend-count">(' + count + ')</span>';
      item.addEventListener('click', (function(ispName, el) {
        return function(e) {
          e.stopPropagation();
          ispVisible[ispName] = !ispVisible[ispName];
          if (ispVisible[ispName]) {
            el.classList.remove('disabled');
          } else {
            el.classList.add('disabled');
          }
          createMarkers();
        };
      })(isp, item));
      div.appendChild(item);
    });

    L.DomEvent.disableScrollPropagation(div);
    L.DomEvent.disableClickPropagation(div);
    return div;
  };
  legend.addTo(map);
}

// === INIT ===
renderStats();
populateFilters();
createLegend();
createMarkers();
</script>
